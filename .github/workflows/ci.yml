name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Keeps the build from failing when POSTGRES_URL is absent in CI.
          # Comments are simply disabled when this is unset (see README).
          POSTGRES_URL: ''
